<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>MyEduConnect - Dashboard</title>
</head>
<body>
	<h2>Welcome, {{ username }}!</h2>
	<p><a href="/courses">View Courses</a> | <a href="/logout">Logout</a></p>
	<hr>
	
	<h3>Campus Announcement Board</h3>
	<form method="POST">
		<label>Post an Announcement / Feedback:</label><br>
        	<textarea name="content" rows="4" cols="50" placeholder="Type announcement here..." required></textarea><br><br>
		<button type="submit">Submit Post</button>
	</form>
	
	<hr>
	<h3>Recent Posts</h3>
	{% for author, content in announcements %}
		<div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
			<strong>Posted by: {{ author }}</strong>
			<p>{{ content | safe }}</p>
		</div>
        {% endfor %}
</body>
</html>
